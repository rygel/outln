  namespace MyApp.Interfaces;

  public interface IWriter
  {
      void Write(string message);
      void WriteLine(string message);
  }

  public interface ILogger
  {
      void Log(string message);
      void LogError(string error);
  }

  public class ConsoleWriter : IWriter
  {
      void IWriter.Write(string message)
      {
          Console.Write(message);
      }

      void IWriter.WriteLine(string message)
      {
          Console.WriteLine(message);
      }

      public void Write(string message)
      {
          Console.Write($"[Console] {message}");
      }

      public void WriteLine(string message)
      {
          Console.WriteLine($"[Console] {message}");
      }
  }

  public class FileLogger : ILogger
  {
      private string _filePath;

      public FileLogger(string filePath)
      {
          _filePath = filePath;
      }

      void ILogger.Log(string message)
      {
          File.AppendAllText(_filePath, message);
      }

      void ILogger.LogError(string error)
      {
          File.AppendAllText(_filePath, $"ERROR: {error}");
      }

      public void Log(string message)
      {
          File.AppendAllText(_filePath, $"[LOG] {message}");
      }
  }

  public interface IDataProvider
  {
      string this[int index] { get; }
      void Reset();
  }

  public class ArrayProvider : IDataProvider
  {
      private string[] _data;

      public ArrayProvider(string[] data)
      {
          _data = data;
      }

      string IDataProvider.this[int index]
      {
          get { return _data[index]; }
      }

      void IDataProvider.Reset()
      {
          _data = new string[0];
      }

      public string this[int index]
      {
          get { return _data[index] ?? string.Empty; }
      }

      public void Reset()
      {
          Array.Clear(_data, 0, _data.Length);
      }
  }

  public interface ICalculator
  {
      int Add(int a, int b);
      int Subtract(int a, int b);
      int Multiply(int a, int b);
      int Divide(int a, int b);
  }

  public class Calculator : ICalculator
  {
      int ICalculator.Add(int a, int b) => a + b;
      int ICalculator.Subtract(int a, int b) => a - b;
      int ICalculator.Multiply(int a, int b) => a * b;
      int ICalculator.Divide(int a, int b) => a / b;

      public int Add(int a, int b) => a + b;
      public int Subtract(int a, int b) => a - b;

      public int Multiply(int a, int b)
      {
          return a * b;
      }

      public int Divide(int a, int b)
      {
          if (b == 0)
              throw new DivideByZeroException();
          return a / b;
      }
  }
