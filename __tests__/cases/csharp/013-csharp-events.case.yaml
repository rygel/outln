  namespace MyApp.Events;

  public class EventPublisher
  {
      public event EventHandler Click;

      public event EventHandler<string> MessageReceived;

      public event Action<EventArgs> SomethingHappened;

      private event EventHandler _internalEvent;

      public event EventHandler CustomEvent
      {
          add { Click += value; }
          remove { Click -= value; }
      }

      public event EventHandler AnotherCustomEvent
      {
          add
          {
              Console.WriteLine("Added");
              Click += value;
          }
          remove
          {
              Console.WriteLine("Removed");
              Click -= value;
          }
      }

      public void Publish()
      {
          Click?.Invoke(this, EventArgs.Empty);
      }
  }

  public class EventSubscriber
  {
      public event EventHandler<NotificationData> Notification;

      public void SendNotification(NotificationData data)
      {
          Notification?.Invoke(this, data);
      }
  }

  public class NotificationData
  {
      public string Message;
      public DateTime Timestamp;
  }
