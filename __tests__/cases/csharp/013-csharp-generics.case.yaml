input/generics.cs: |
  namespace MyApp.Collections;

  public class Box<T> {
      private T value;

      public Box(T value) {
          this.value = value;
      }

      public T GetValue() {
          return value;
      }
  }

  public class Pair<A, B> {
      private A first;
      private B second;

      public Pair(A first, B second) {
          this.first = first;
          this.second = second;
      }

      public A GetFirst() { return first; }
      public B GetSecond() { return second; }
  }

  public class Triple<T, U, V> {
      private T first;
      private U second;
      private V third;

      public Triple(T first, U second, V third) {
          this.first = first;
          this.second = second;
          this.third = third;
      }
  }

  public class Bounded<T> where T : IComparable<T> {
      private T value;

      public Bounded(T value) {
          this.value = value;
      }
  }

  public interface IFunction<T, R> {
      R Apply(T t);
  }
