  namespace MyApp.Extensions;


  public static class StringExtensions

  {
      public static bool IsNullOrEmpty(this string value)
      {
          return string.IsNullOrEmpty(value);
      }

      public static string Reverse(this string value)
      {
          var chars = value.ToCharArray();
          Array.Reverse(chars);
          return new string(chars);
      }

      public static string ToTitleCase(this string value)
      {
          if (string.IsNullOrEmpty(value))
              return value;

          var words = value.Split(' ');
          for (int i = 0; i < words.Length; i++)
          {
              if (words[i].Length > 0)
              {
                  words[i] = char.ToUpper(words[i][0]) + words[i].Substring(1).ToLower();
              }
          }
          return string.Join(' ', words);
      }

      public static string Truncate(this string value, int maxLength)
      {
          if (string.IsNullOrEmpty(value))
              return value;

          return value.Length <= maxLength ? value : value.Substring(0, maxLength) + "...";
      }
  }


  public static class EnumerableExtensions

  {
      public static T Random<T>(this IEnumerable<T> source)
      {
          var random = new Random();
          var list = source.ToList();
          return list[random.Next(list.Count)];
      }

      public static IEnumerable<T> Shuffle<T>(this IEnumerable<T> source)
      {
          var random = new Random();
          return source.OrderBy(x => random.Next());
      }

      public static IEnumerable<T> DistinctBy<T, TKey>(this IEnumerable<T> source, Func<T, TKey> keySelector)
      {
          var seen = new HashSet<TKey>();
          foreach (var item in source)
          {
              if (seen.Add(keySelector(item)))
              {
                  yield return item;
              }
          }
      }
  }


  public static class DateTimeExtensions

  {
      public static DateTime ToEndOfDay(this DateTime date)
      {
          return date.Date.AddDays(1).AddTicks(-1);
      }

      public static DateTime ToStartOfDay(this DateTime date)
      {
          return date.Date;
      }

      public static int Age(this DateTime birthDate)
      {
          var today = DateTime.Today;
          var age = today.Year - birthDate.Year;
          if (birthDate > today.AddYears(-age))
              age--;
          return age;
      }

      public static bool IsWeekend(this DateTime date)
      {
          return date.DayOfWeek == DayOfWeek.Saturday || date.DayOfWeek == DayOfWeek.Sunday;
      }
  }


  public static class ObjectExtensions

  {
      public static T As<T>(this object obj) where T : class
      {
          return obj as T;
      }

      public static bool Is<T>(this object obj) where T : class
      {
          return obj is T;
      }

      public static TResult MapTo<T, TResult>(this T source, Func<T, TResult> mapper)
      {
          return mapper(source);
      }
  }
