  namespace MyApp.Resources;

  public class FileHandle
  {
      private IntPtr _handle;

      public FileHandle(IntPtr handle)
      {
          _handle = handle;
      }

      ~FileHandle()
      {
          Close();
      }

      private void Close()
      {
          if (_handle != IntPtr.Zero)
          {
              NativeMethods.CloseHandle(_handle);
              _handle = IntPtr.Zero;
          }
      }
  }

  public class DatabaseConnection
  {
      private string _connectionString;

      public DatabaseConnection(string connectionString)
      {
          _connectionString = connectionString;
      }

      ~DatabaseConnection()
      {
          Dispose();
      }

      private void Dispose()
      {
          if (_connectionString != null)
          {
              NativeMethods.CloseConnection(_connectionString);
              _connectionString = null;
          }
      }
  }

  public class UnmanagedResource
  {
      private IntPtr _resource;

      public UnmanagedResource(IntPtr resource)
      {
          _resource = resource;
      }

      ~UnmanagedResource()
      {
          Release();
      }

      private void Release()
      {
          if (_resource != IntPtr.Zero)
          {
              NativeMethods.ReleaseResource(_resource);
              _resource = IntPtr.Zero;
          }
      }
  }

  public static class NativeMethods
  {
      public static void CloseHandle(IntPtr handle)
      {
      }

      public static void CloseConnection(string connectionString)
      {
      }

      public static void ReleaseResource(IntPtr resource)
      {
      }
  }
