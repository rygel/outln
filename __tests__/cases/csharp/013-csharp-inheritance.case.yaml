input/inheritance.cs: |
  namespace MyApp.Animals;

  class Animal {
      public void Speak() {}
  }

  public class Dog : Animal {
      private string breed;

      public Dog(string breed) {
          this.breed = breed;
      }

      public override void Speak() {
          Console.WriteLine("Woof");
      }
  }

  interface IPet {
      void Play();
  }

  interface INamed {
      string GetName();
  }

  public class Cat : Animal, IPet, INamed {
      private string name;

      public Cat(string name) {
          this.name = name;
      }

      public void Play() {}

      public string GetName() {
          return name;
      }
  }
