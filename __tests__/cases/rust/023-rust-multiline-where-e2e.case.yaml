args:
  - --debug
  - input/rust-multiline-where-e2e.rs
input/rust-multiline-where-e2e.rs: |
  use std::collections::{HashMap, HashSet};

  fn single_line() -> i32 { 42 }

  pub(crate) fn generic_where<T>(value: T) -> T
  where
      T: Clone,
  {
      value.clone()
  }

  fn multi_param<T, U>(x: T, y: U) -> U
  where
      T: Display,
      U: Clone,
  {
      y
  }
