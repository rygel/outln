  package com.example;

  public sealed interface Shape permits Circle, Rectangle, Triangle {
      double area();
      double perimeter();
  }

  public sealed interface Colorable permits Red, Blue, Green {
      String getColor();
      void setColor(String color);
  }

  public interface Movable permits Vehicle {
      void move();
      int getSpeed();
  }

  public sealed interface Flyable permits Bird, Airplane {
      void fly();
      void land();
  }

  public final class Circle implements Shape {
      private final double radius;

      public Circle(double radius) {
          this.radius = radius;
      }

      @Override
      public double area() {
          return Math.PI * radius * radius;
      }

      @Override
      public double perimeter() {
          return 2 * Math.PI * radius;
      }
  }

  public final class Rectangle implements Shape {
      private final double width;
      private final double height;

      public Rectangle(double width, double height) {
          this.width = width;
          this.height = height;
      }

      @Override
      public double area() {
          return width * height;
      }

      @Override
      public double perimeter() {
          return 2 * (width + height);
      }
  }

  public final class Triangle implements Shape {
      private final double base;
      private final double height;

      public Triangle(double base, double height) {
          this.base = base;
          this.height = height;
      }

      @Override
      public double area() {
          return 0.5 * base * height;
      }

      @Override
      public double perimeter() {
          return base + height + Math.sqrt(base * base + height * height);
      }
  }

  public final class Red implements Colorable {
      private String color = "Red";

      @Override
      public String getColor() {
          return color;
      }

      @Override
      public void setColor(String color) {
          this.color = color;
      }
  }

  public final class Blue implements Colorable {
      private String color = "Blue";

      @Override
      public String getColor() {
          return color;
      }

      @Override
      public void setColor(String color) {
          this.color = color;
      }
  }

  public final class Green implements Colorable {
      private String color = "Green";

      @Override
      public String getColor() {
          return color;
      }

      @Override
      public void setColor(String color) {
          this.color = color;
      }
  }

  public abstract class Vehicle implements Movable {
      protected String name;
      protected int speed = 0;

      public Vehicle(String name) {
          this.name = name;
      }

      @Override
      public void move() {
          speed = 60;
      }

      @Override
      public int getSpeed() {
          return speed;
      }
  }

  public final class Car extends Vehicle {
      public Car(String name) {
          super(name);
      }
  }

  public final class Bird implements Flyable {
      private boolean isFlying = false;

      @Override
      public void fly() {
          isFlying = true;
      }

      @Override
      public void land() {
          isFlying = false;
      }
  }

  public final class Airplane implements Flyable {
      private boolean isFlying = false;

      @Override
      public void fly() {
          isFlying = true;
      }

      @Override
      public void land() {
          isFlying = false;
      }
  }
