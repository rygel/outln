input/records.java: |
  package com.example;

  public record Person(String name, int age) {
      public Person {
          if (age < 0) {
              throw new IllegalArgumentException("Age cannot be negative");
          }
      }
      
      public String greeting() {
          return "Hello, " + name;
      }
  }

  public record Point(int x, int y) {
      public static Point origin() {
          return new Point(0, 0);
      }
  }
