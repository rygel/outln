  package com.example;

  public class Sample {
    private String name;
    private int age;

    public Sample(String name, int age) {
      this.name = name;
      this.age = age;
    }

    public String getName() {
      return name;
    }

    public void setName(String name) {
      this.name = name;
    }

    public int getAge() {
      return age;
    }

    public static void main(String[] args) {
      System.out.println("Hello");
    }
  }
