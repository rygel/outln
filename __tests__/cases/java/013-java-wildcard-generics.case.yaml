input/wildcard-generics.java: >
  package com.example;


  import java.util.List;

  import java.util.ArrayList;


  public class WildcardExample {
      public void printList(List<?> list) {
          for (Object item : list) {
              System.out.println(item);
          }
      }

      public void addNumbers(List<? extends Number> list) {
          double sum = 0;
          for (Number num : list) {
              sum += num.doubleValue();
          }
          System.out.println("Sum: " + sum);
      }

      public void addStrings(List<? super String> list) {
          list.add("Hello");
      }

      public List<?> copyList(List<?> source) {
          return new ArrayList<>(source);
      }

      public <T> void processList(List<? extends T> list, T item) {
          for (T element : list) {
              System.out.println(element);
          }
          list.add(item);
      }

      public boolean containsAll(List<?> list1, List<?> list2) {
          for (Object item : list1) {
              if (!list2.contains(item)) {
                  return false;
              }
          }
          return true;
      }

      public void printUpperBounds(List<? extends Number> nums, List<? extends Comparable<?>> items) {
          System.out.println("Numbers: " + nums.size());
          System.out.println("Items: " + items.size());
      }

      public void printLowerBounds(List<? super Number> nums, List<? super String> strs) {
          nums.add(42);
          strs.add("Hello");
      }
  }


  class Pair<T, U> {
      private T first;
      private U second;

      public Pair(T first, U second) {
          this.first = first;
          this.second = second;
      }

      public void setFirst(T first) {
          this.first = first;
      }

      public void setSecond(U second) {
          this.second = second;
      }
  }


  class PairUtil {
      public void swapFirst(Pair<? extends Number, ?> pair, Number newValue) {
          pair.setFirst(newValue);
      }

      public <T> void copyFirst(Pair<? extends T, ?> source, Pair<T, ?> target) {
          T value = extractFirst(source);
          target.setFirst(value);
      }

      private <T> T extractFirst(Pair<T, ?> pair) {
          return pair.first;
      }
  }


  interface Repository<T> {
      void save(T entity);
      T findById(int id);
      List<? extends T> findAll();
  }
