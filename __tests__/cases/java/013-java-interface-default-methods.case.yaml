input/interface-default-methods.java: |
  package com.example;

  public interface Vehicle {
      default String getType() {
          return "Vehicle";
      }

      default int getSpeed() {
          return 0;
      }
  }

  public interface Movable extends Vehicle {
      @Override
      default String getType() {
          return "Movable " + super.getType();
      }

      default void move() {
          System.out.println("Moving");
      }
  }

  public interface Flyable {
      default void fly() {
          System.out.println("Flying");
      }
  }

  public class Car implements Movable, Flyable {
      public void move() {
          System.out.println("Driving");
      }

      public void fly() {
          System.out.println("Cannot fly");
      }
  }
