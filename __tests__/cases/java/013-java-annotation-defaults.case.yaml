input/annotation-defaults.java: |
  package com.example;

  @interface Entity {
      String tableName();
      String schema() default "public";
      boolean cached() default true;
      int timeout() default 30;
  }

  @interface Service {
      String name();
      Class<?> type() default Object.class;
      String[] tags() default {};
  }

  @interface Endpoint {
      String path();
      String method() default "GET";
      boolean authRequired() default true;
      String[] produces() default {"application/json"};
  }

  @Entity(tableName = "users", schema = "app")
  public class User {
      private String name;
      private int age;

      public User(String name, int age) {
          this.name = name;
          this.age = age;
      }
  }
