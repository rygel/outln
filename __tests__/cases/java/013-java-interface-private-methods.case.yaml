  package com.example;

  public interface Logger {
      default void log(String message) {
          validateMessage(message);
          System.out.println("LOG: " + message);
      }

      default void error(String message) {
          validateMessage(message);
          System.out.println("ERROR: " + message);
      }

      private void validateMessage(String message) {
          if (message == null || message.isEmpty()) {
              throw new IllegalArgumentException("Message cannot be empty");
          }
      }

      private static String getTimestamp() {
          return java.time.Instant.now().toString();
      }
  }

  public interface Calculator {
      default int add(int a, int b) {
          return a + b;
      }

      default int multiply(int a, int b) {
          return a * b;
      }

      default int calculate(int a, int b, String operation) {
          return performCalculation(a, b, operation);
      }

      private int performCalculation(int a, int b, String operation) {
          switch (operation) {
              case "+": return a + b;
              case "*": return a * b;
              case "-": return a - b;
              case "/": return b != 0 ? a / b : 0;
              default: throw new IllegalArgumentException("Invalid operation");
          }
      }
  }

  public interface DataProcessor {
      default void process(String data) {
          String cleanData = cleanData(data);
          processCleanData(cleanData);
      }

      private String cleanData(String data) {
          return data.trim().replaceAll("\\s+", " ");
      }

      private void processCleanData(String data) {
          System.out.println("Processing: " + data);
      }
  }

  public class Main implements Logger {
      public static void main(String[] args) {
          Main logger = new Main();
          logger.log("Hello, World!");
          logger.error("An error occurred");
      }
  }
