input/ inheritance.java: |
  package com.example;

  class Animal {
    public void speak() {}
  }

  public class Dog extends Animal {
    private String breed;

    public Dog(String breed) {
      super();
      this.breed = breed;
    }

    @Override
    public void speak() {
      System.out.println("Woof");
    }
  }

  interface Pet {
    void play();
  }

  interface Named {
    String getName();
  }

  public class Cat extends Animal implements Pet, Named {
    private String name;

    public Cat(String name) {
      this.name = name;
    }

    @Override
    public void play() {}

    @Override
    public String getName() {
      return name;
    }
  }
