input/enums.java: |
  package com.example;

  enum Color {
    RED,
    GREEN,
    BLUE
  }

  enum Status {
    PENDING("Pending"),
    ACTIVE("Active"),
    COMPLETED("Completed");

    private final String label;

    Status(String label) {
      this.label = label;
    }

    public String getLabel() {
      return label;
    }
  }

  @interface Deprecated {
    String value() default "";
  }

  @interface Entity {
    String tableName();
  }
