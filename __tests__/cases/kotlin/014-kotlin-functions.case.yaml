args:
  - input/functions.kt
input/functions.kt: |
  package com.example

  fun hello(): Unit = println("Hello")

  fun add(a: Int, b: Int): Int = a + b

  fun greet(name: String): String {
    return "Hello, $name"
  }

  fun String.exclaim(): String = this + "!"

  fun List<Int>.sum(): Int {
    var total = 0
    for (item in this) {
      total += item
    }
    return total
  }

  infix fun Int.timesRepeated(action: () -> Unit) {
    repeat(this) { action() }
  }
