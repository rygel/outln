args:
  - input/inline-functions.kt
input/inline-functions.kt: |
  package com.example

  inline fun measureTime(action: () -> Unit): Long {
      val start = System.currentTimeMillis()
      action()
      return System.currentTimeMillis() - start
  }

  inline fun <T> measureTimeReturning(action: () -> T): Pair<Long, T> {
      val start = System.currentTimeMillis()
      val result = action()
      val elapsed = System.currentTimeMillis() - start
      return Pair(elapsed, result)
  }

  inline fun <T> lock(lock: Any, action: () -> T): T {
      synchronized(lock) {
          return action()
      }
  }

  inline fun <T, R> T.applyIf(condition: Boolean, block: T.() -> Unit): T {
      if (condition) {
          this.block()
      }
      return this
  }

  class Logger {
      inline fun debug(message: () -> String) {
          if (isDebugEnabled) {
              println(message())
          }
      }

      inline fun debugLazy(message: String) {
          if (isDebugEnabled) {
              println(message)
          }
      }

      companion object {
          var isDebugEnabled = true
      }
  }
