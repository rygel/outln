args:
  - input/inheritance.kt
input/inheritance.kt: |
  package com.example

  open class Animal {
    open fun speak() {}
  }

  class Dog(val breed: String) : Animal() {
    override fun speak() {
      println("Woof")
    }
  }

  interface Pet {
    fun play()
  }

  interface Named {
    fun getName(): String
  }

  class Cat(private val name: String) : Animal(), Pet, Named {
    override fun play() {}

    override fun getName(): String = name
  }

  object Singleton {
    val instance: Singleton = this
  }
