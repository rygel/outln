args:
  - input/reified.kt
input/reified.kt: |
  package com.example

  inline fun <reified T> printType() {
      println(T::class)
  }

  inline fun <reified T : Any> ofType(value: Any): T? {
      return value as? T
  }

  class MyClass {
      inline fun <reified T> memberPrint() {
          println(T::class)
      }
  }
