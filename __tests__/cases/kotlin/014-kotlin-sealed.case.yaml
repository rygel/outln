args:
  - input/sealed.kt
input/sealed.kt: |
  package com.example

  sealed class Shape {
      abstract fun area(): Double
  }

  class Circle(val radius: Double) : Shape() {
      override fun area(): Double = Math.PI * radius * radius
  }

  sealed interface Drawable {
      fun draw(): String
  }

  class Canvas : Drawable {
      override fun draw(): String = "canvas"
  }
