args:
  - input/properties.kt
input/properties.kt: |
  package com.example

  val constant = 42

  var mutable = "hello"

  const val COMPILE_TIME = "constant"

  lateinit var lateInit: String

  class Properties {
    val readOnly = "read"
    var readWrite = "write"

    val computed: String
      get() = readOnly + readWrite

    var counter = 0
      private set

    companion object {
      const val CONST = 1
    }
  }

  typealias StringList = List<String>
  typealias Action = () -> Unit
