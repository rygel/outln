args:
  - --debug
  - input/multi-line-members.ts
input/multi-line-members.ts: |
  class MultiLine {
    constructor(
      a: number,
      b: string
    ) {
      console.log(a, b);
    }
    calculate(
      x: number,
      y: number
    ): number {
      return x + y;
    }
  }
