args:
  - input/api.d.ts
  - input/utils.ts
input/api.d.ts: |
  /**
   * API type definitions.
   */
  import FS = require('node:fs');

  declare function makeRequest(url: string): Promise<Response>;
  declare function makeRequest(url: URL): Promise<Response>;
  declare class ApiClient {
    constructor(key: string);
  }
  declare const API_VERSION: string;
  declare module 'external' {
    export const value: number;
  }
  declare global {
    interface Window {
      api: ApiClient;
    }
  }
input/utils.ts: |
  /**
   * Utility functions.
   */
  namespace Internal {
    export function helper(): void;
  }
  module Shared {
    export const VERSION = '1.0.0';
  }
  import Path = require('node:path');
  import Join = Path.join;

  export function format(value: string): string {
    return value.trim();
  }
stdout: |
  input/api.d.ts
  /**
   * API type definitions.
   */
  [L4-L4] import FS
  [L6-L6] declare function makeRequest(url: string): Promise<Response>
  [L7-L7] declare function makeRequest(url: URL): Promise<Response>
  [L8-L10] declare class ApiClient
  [L11-L11] declare const API_VERSION
  [L12-L14] declare module 'external'
  [L15-L19] declare global

  input/utils.ts
  /**
   * Utility functions.
   */
  [L4-L6] namespace Internal
  [L7-L9] module Shared
  [L10-L10] import Path
  [L11-L11] import Join
  [L13-L15] export function format(value: string): string
