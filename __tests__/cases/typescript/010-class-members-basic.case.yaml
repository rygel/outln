input/class-members.ts: |
  class Counter {
    private value: number;
    constructor(initial: number) {
      this.value = initial;
    }
    increment(step: number): void {
      this.value += step;
    }
    get count() {
      return this.value;
    }
    set count(next: number) {
      this.value = next;
    }
  }
