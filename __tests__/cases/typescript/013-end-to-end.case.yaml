input/service.ts: |
  // Main service module.
  // Provides core functionality.

  export interface Config {
    name: string;
  }

  export class Service {
    constructor(private config: Config) {}

    start(): void {
      console.log('starting');
    }
  }

  export function createService(config: Config): Service {
    return new Service(config);
  }
