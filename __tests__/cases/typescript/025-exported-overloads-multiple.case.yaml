  export function parse(input: string): number;
  export function parse(input: number): number;
  export function parse(input: string | number): number {
    return Number(input);
  }

  export function format(value: number, radix?: number): string;
  export function format(value: bigint, radix?: number): string;
  export function format(value: number | bigint, radix = 10): string {
    return value.toString(radix);
  }
