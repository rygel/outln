input/sample.rs: |
  // Core account domain types.
  // Shared by CLI and API.

  mod storage;
  mod net {}
  extern crate alloc;
  use crate::domain::User;
  type UserId = u64;
  struct Account { id: UserId }
  enum Role { Admin, User }
  union Bits { n: u32 }
  const MAX_RETRIES: u8 = 3;
  static BUILD_ID: &str = "dev";
  static mut GLOBAL_COUNT: u64 = 0;
  trait Runner { fn run(&self); }
  impl Runner for Account { fn run(&self) {} }
  impl Account { fn new(id: UserId) -> Self { Self { id } } }
  extern "C" { fn c_log(code: i32); }
  macro_rules! make_id { ($x:expr) => { $x as UserId }; }
  async fn load_user(id: UserId) -> Result<Account, ()> { Ok(Account { id }) }
