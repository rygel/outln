args:
  - input/models/config.go
  - input/utils/helpers.go
  - input/main.go
input/models/config.go: |
  // Configuration models for the application.
  // Contains all domain types and constants.

  package models

  import "time"

  const DefaultTimeout = 30 * time.Second

  const (
    StatusActive   = "active"
    StatusInactive = "inactive"
  )

  type Config struct {
    Name    string
    Timeout time.Duration
  }

  type Service interface {
    Start() error
    Stop() error
  }

  func NewConfig(name string) *Config {
    return &Config{
      Name:    name,
      Timeout: DefaultTimeout,
    }
  }

  func (c *Config) IsValid() bool {
    return c.Name != ""
  }
input/utils/helpers.go: |
  package utils

  var (
    DebugMode = false
    LogLevel  = "info"
  )

  func FormatMessage(msg string) string {
    return "[" + LogLevel + "] " + msg
  }

  func (u *Utils) Process() error {
    return nil
  }

  type Utils struct{}
input/main.go: |
  //go:build !windows

  // Main entry point for the CLI application.

  package main

  import (
    "fmt"
    "os"
  )

  func main() {
    fmt.Println("Hello")
    os.Exit(0)
  }

  func init() {
    // Setup
  }
