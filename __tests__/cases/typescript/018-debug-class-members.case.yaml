args:
  - --debug
  - input/debug-class-members.ts
input/debug-class-members.ts: |
  class Counter {
    private value: number;
    constructor(initial: number) {
      this.value = initial;
    }
    get count() {
      return this.value;
    }
    increment(step: number): void {
      this.value += step;
    }
  }
