input/services/user-service.ts: |
  /**
   * Service for managing user accounts.
   */
  export class UserService {
    private users: Map<string, User>;
    constructor(database: Database) {
      this.users = new Map();
    }
    async findById(id: string): Promise<User | null> {
      return this.users.get(id) ?? null;
    }
    get count(): number {
      return this.users.size;
    }
  }
input/models/counter.ts: |
  /**
   * Simple counter class for counting things.
   */
  export class Counter {
    private value = 0;
    increment(): void {
      this.value++;
    }
    decrement(): void {
      this.value--;
    }
    get current(): number {
      return this.value;
    }
    set current(val: number) {
      this.value = val;
    }
  }
input/utils/event-emitter.ts: |
  /**
   * Minimal event emitter implementation.
   */
  abstract class EventEmitter {
    private listeners = new Map<string, Set<Listener>>();
    abstract emit(event: string, data: unknown): boolean;
    #validateEvent(event: string): boolean {
      return typeof event === 'string';
    }
  }
